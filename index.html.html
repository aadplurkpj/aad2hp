<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>戰況即時血量</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;
  --surface:#1a1d27;
  --surface2:#21253a;
  --border:#2a2d3e;
  --accent:#82D900;
  --accent-dim:rgba(130,217,0,.15);
  --text:#e8eaf2;
  --muted:#7b7f9e;
  --red:#ff4f4f;
  --radius:12px;
}
body{background:var(--bg);color:var(--text);font-family:"Noto Sans TC","Segoe UI",system-ui,sans-serif;min-height:100vh}

/* ── HEADER ── */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;position:sticky;top:0;z-index:100}
.header-inner{max-width:1000px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.hi{min-width:0}
.page-title{font-size:.95rem;font-weight:700;letter-spacing:.05em;cursor:text;display:inline-block;line-height:1.4}
.page-title:hover{color:var(--accent)}
.sub{font-size:.72rem;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:6px}
.url-display{color:var(--accent);cursor:pointer;border-bottom:1px dashed rgba(130,217,0,.4);transition:border-color .15s}
.url-display:hover{border-bottom-color:var(--accent)}
.url-hint{color:var(--muted);font-style:italic}
.inline-input{background:var(--bg);border:1px solid var(--accent);border-radius:5px;padding:1px 8px;color:var(--text);font-family:inherit;font-size:.72rem;outline:none}
.title-input{font-size:.95rem;font-weight:700;letter-spacing:.05em;width:220px}
.url-input{width:320px}
.hbtns{display:flex;gap:8px;align-items:center;flex-shrink:0}
.btn{border-radius:9px;padding:8px 18px;font-size:.85rem;font-weight:700;cursor:pointer;border:none;transition:opacity .15s,background .15s}
.btn-ghost{background:transparent;color:var(--text);border:2px solid var(--border)}
.btn-ghost:hover{border-color:var(--accent)}
.btn-primary{background:var(--accent);color:#0f1117}
.btn-primary:hover{opacity:.87}
.btn-primary:disabled{opacity:.4;cursor:default}

/* ── MAIN ── */
main{max-width:1000px;margin:0 auto;padding:28px 20px}

/* ── 怪物設定 ── */
.setup-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:20px;margin-bottom:28px}
.boss-col{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 16px;display:flex;flex-direction:column;align-items:center;gap:12px}
.boss-col-name{font-size:1.6rem;font-weight:700;cursor:text;text-align:center}
.boss-col-name:hover{color:var(--accent)}
.boss-name-edit{font-size:1.4rem;font-weight:700;text-align:center;background:var(--bg);border:1px solid var(--accent);border-radius:8px;color:var(--text);width:130px;outline:none;padding:2px 6px}
.boss-fields{display:flex;gap:8px;width:100%}
.bfield{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.bfield label{font-size:.68rem;color:var(--muted);white-space:nowrap}
.bfield input{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:5px 3px;color:var(--text);font-size:.78rem;width:100%;text-align:center;outline:none}
.bfield input:focus{border-color:var(--accent)}
.boss-deduct{display:flex;align-items:center;gap:6px;font-size:.72rem;color:var(--muted);width:100%;justify-content:center}
.boss-deduct input{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:4px 6px;color:var(--text);font-size:.78rem;width:72px;text-align:center;outline:none}
.boss-deduct input:focus{border-color:var(--accent)}
.boss-actions{display:flex;gap:6px}
.icon-btn{width:28px;height:28px;border-radius:7px;border:none;font-size:1rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.icon-btn-del{background:rgba(255,60,60,.12);color:#ff5f5f}
.icon-btn-del:hover{background:rgba(255,60,60,.28)}
.icon-btn-add{background:var(--accent-dim);color:var(--accent)}
.icon-btn-add:hover{background:rgba(130,217,0,.28)}

/* ── URL 輸入區（初始） ── */
.url-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:28px;display:flex;flex-direction:column;gap:12px;align-items:flex-start}
.url-section label{font-size:.8rem;font-weight:600;color:var(--muted)}
.url-big{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:inherit;font-size:.88rem;outline:none;width:100%;max-width:520px}
.url-big:focus{border-color:var(--accent)}
.url-hint-text{font-size:.72rem;color:var(--muted)}

/* ── 對戰圓餅圖 ── */
.battle-section{display:none}
.battle-section.active{display:block}
.setup-section.hidden{display:none}
.pie-grid{display:flex;flex-wrap:wrap;gap:36px;justify-content:center;margin-bottom:28px}
.pie-col{display:flex;flex-direction:column;align-items:center;gap:12px}
.pie-boss-name{font-size:1.55rem;font-weight:700}
.pie-wrap{position:relative;width:200px;height:200px}
.pie-wrap canvas{display:block}
.pie-num{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-size:2rem;font-weight:700;font-family:"Courier New",monospace;
  color:#fff;text-shadow:0 2px 12px rgba(0,0,0,.95);
  pointer-events:none;white-space:nowrap;text-align:center
}
.pie-num.dead{color:var(--red)}
.status-bar{text-align:center;font-size:.82rem;color:var(--muted);margin-bottom:20px;min-height:1.5em}
.status-bar b{color:var(--accent)}
.status-bar.error{color:var(--red)}
.btn-manual{display:block;margin:0 auto;background:transparent;color:var(--text);border:2px solid var(--accent);border-radius:10px;padding:11px 36px;font-size:.9rem;font-weight:700;cursor:pointer;transition:background .15s}
.btn-manual:hover{background:rgba(130,217,0,.1)}
.btn-manual:disabled{opacity:.4;cursor:default}

/* ── loading overlay ── */
.loading{display:none;position:fixed;inset:0;background:rgba(15,17,23,.82);z-index:999;flex-direction:column;align-items:center;justify-content:center;gap:18px}
.loading.active{display:flex}
.spinner{width:44px;height:44px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-msg{font-size:.9rem;color:var(--muted)}

/* ── 錯誤提示 ── */
.err-banner{display:none;background:rgba(255,79,79,.12);border:1px solid rgba(255,79,79,.35);border-radius:8px;padding:10px 16px;font-size:.8rem;color:var(--red);margin-bottom:18px}
.err-banner.active{display:block}
</style>
</head>
<body>

<!-- Loading overlay -->
<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-msg" id="loadingMsg">正在抓取留言…</div>
</div>

<header>
  <div class="header-inner">
    <div class="hi">
      <div class="page-title" id="pageTitle" ondblclick="editTitle(this)">戰況即時血量</div>
      <div class="sub">
        來源：<span id="urlDisplay" ondblclick="editUrl(this)"><span class="url-hint">（雙擊輸入噗文網址）</span></span>
      </div>
    </div>
    <div class="hbtns">
      <button class="btn btn-ghost" onclick="resetAll()">重置</button>
      <button class="btn btn-primary" id="battleBtn" onclick="startBattle()">開始對戰</button>
    </div>
  </div>
</header>

<main>
  <div class="err-banner" id="errBanner"></div>

  <!-- 設定區 -->
  <div class="setup-section" id="setupSection">
    <!-- URL 輸入 -->
    <div class="url-section" id="urlSection">
      <label>噗文網址</label>
      <input class="url-big" id="urlInput" type="text" placeholder="https://www.plurk.com/p/xxxxxx"
             oninput="onUrlInput(this.value)" value="">
      <div class="url-hint-text">貼上公開噗文的網址，工具會自動抓取所有回覆來計算怪物血量</div>
    </div>
    <!-- 怪物設定 -->
    <div class="setup-grid" id="bossGrid"></div>
  </div>

  <!-- 對戰區 -->
  <div class="battle-section" id="battleSection">
    <div class="pie-grid" id="pieGrid"></div>
    <div class="status-bar" id="statusBar"></div>
    <button class="btn-manual" id="manualBtn" onclick="manualRefresh()">手動刷新戰況</button>
  </div>
</main>

<script>
// ═══════════════════════════════════════════
// Constants & State
// ═══════════════════════════════════════════
// ← 部署 Cloudflare Worker 後，把網址換成你的 Worker 網址
// 例如：'https://plurk-hp.yourname.workers.dev'
const WORKER_URL = 'https://aad2026hp.aadop2021.workers.dev/';

let plurkIdStr  = '';   // base36 string
let numericId   = 0;
let allMsgs     = [];   // [{content, posted_at}]
let bossData    = [];
let maxHpMap    = {};
let autoTimer   = null;
let autoActive  = false;

// localStorage keys (set after plurkIdStr known)
function bKey(){ return 'bossdata_' + (plurkIdStr||'default'); }
function tKey(){ return 'pagetitle_' + (plurkIdStr||'default'); }
function uKey(){ return 'plurkurl_default'; }

// ═══════════════════════════════════════════
// Init
// ═══════════════════════════════════════════
(function init(){
  // restore title
  const t = localStorage.getItem('pagetitle_default');
  if(t) document.getElementById('pageTitle').textContent = t;
  // restore url
  const u = localStorage.getItem(uKey());
  if(u){
    document.getElementById('urlInput').value = u;
    setUrlDisplay(u);
    parseUrl(u);
  }
  loadBossData();
  renderBossSetup();
})();

// ═══════════════════════════════════════════
// URL handling
// ═══════════════════════════════════════════
function onUrlInput(val){
  localStorage.setItem(uKey(), val);
  setUrlDisplay(val);
  parseUrl(val);
}

function parseUrl(val){
  const m = /plurk\.com\/p\/([a-zA-Z0-9]+)/.exec(val||'');
  if(m){
    plurkIdStr = m[1];
    numericId  = parseInt(plurkIdStr, 36);
    loadBossData(); // reload with correct key
    renderBossSetup();
  } else {
    plurkIdStr = '';
    numericId  = 0;
  }
}

function setUrlDisplay(val){
  const el = document.getElementById('urlDisplay');
  if(!val){
    el.innerHTML = '<span class="url-hint">（雙擊輸入噗文網址）</span>';
    return;
  }
  const m = /plurk\.com\/p\/([a-zA-Z0-9]+)/.exec(val);
  el.textContent = m ? val : val;
}

function editUrl(el){
  // point to the big input instead
  const inp = document.getElementById('urlInput');
  inp.focus(); inp.select();
}

// ═══════════════════════════════════════════
// Title editing
// ═══════════════════════════════════════════
function editTitle(el){
  if(el.querySelector('input')) return;
  const orig = el.textContent;
  el.textContent = '';
  const inp = document.createElement('input');
  inp.className = 'inline-input title-input';
  inp.value = orig;
  el.appendChild(inp); inp.focus(); inp.select();
  function save(){
    const v = inp.value.trim()||orig;
    localStorage.setItem(tKey(), v);
    el.textContent = v;
  }
  inp.addEventListener('blur', save);
  inp.addEventListener('keydown', e=>{
    if(e.key==='Enter'){e.preventDefault();inp.blur();}
    if(e.key==='Escape'){inp.value=orig;inp.blur();}
  });
}

// ═══════════════════════════════════════════
// Boss data
// ═══════════════════════════════════════════
function loadBossData(){
  let d = null;
  try{ d = JSON.parse(localStorage.getItem(bKey())||'null'); }catch(e){}
  if(!d||!Array.isArray(d)||!d.length){
    d = [
      {name:'怪1',faces:'',count:'',hpEach:'',deduct:''},
      {name:'怪2',faces:'',count:'',hpEach:'',deduct:''},
      {name:'怪3',faces:'',count:'',hpEach:'',deduct:''},
    ];
  }
  bossData = d;
}
function saveBossData(){ localStorage.setItem(bKey(), JSON.stringify(bossData)); }

// ═══════════════════════════════════════════
// Boss setup UI
// ═══════════════════════════════════════════
function renderBossSetup(){
  document.getElementById('bossGrid').innerHTML = bossData.map((b,i)=>`
    <div class="boss-col">
      <div class="boss-col-name" ondblclick="editBossName(${i},this)">${esc(b.name)}</div>
      <div class="boss-fields">
        <div class="bfield"><label>骰面</label><input type="text"   value="${esc(b.faces)}"  placeholder="d12" oninput="setF(${i},'faces',this.value)"></div>
        <div class="bfield"><label>數量</label><input type="number" value="${esc(b.count)}"   oninput="setF(${i},'count',this.value)"></div>
        <div class="bfield"><label>單體HP</label><input type="number" value="${esc(b.hpEach)}" oninput="setF(${i},'hpEach',this.value)"></div>
      </div>
      <div class="boss-deduct">
        <div class="boss-actions">
          <button class="icon-btn icon-btn-del" onclick="removeBoss(${i})" title="刪除">－</button>
          <button class="icon-btn icon-btn-add" onclick="addBoss(${i})"    title="新增">＋</button>
        </div>
        <label>預扣</label>
        <input type="number" value="${esc(b.deduct||'')}" oninput="setF(${i},'deduct',this.value)">
      </div>
    </div>
  `).join('');
}

function setF(i,f,v){ bossData[i][f]=v; saveBossData(); }

function editBossName(i,el){
  if(el.querySelector('input')) return;
  const orig = bossData[i].name;
  el.textContent='';
  const inp = document.createElement('input');
  inp.className='boss-name-edit'; inp.value=orig;
  el.appendChild(inp); inp.focus(); inp.select();
  function save(){ const v=inp.value.trim()||orig; bossData[i].name=v; saveBossData(); renderBossSetup(); }
  inp.addEventListener('blur',save);
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter'){e.preventDefault();inp.blur();} if(e.key==='Escape'){inp.value=orig;inp.blur();} });
}

function addBoss(after){
  if(bossData.length>=8){ showErr('最多 8 種怪物'); return; }
  bossData.splice(after+1,0,{name:'怪'+(bossData.length+1),faces:'',count:'',hpEach:'',deduct:''});
  saveBossData(); renderBossSetup();
}
function removeBoss(i){
  if(bossData.length<=1){ showErr('至少保留 1 種怪物'); return; }
  bossData.splice(i,1); saveBossData(); renderBossSetup();
}

// ═══════════════════════════════════════════
// Error banner
// ═══════════════════════════════════════════
function showErr(msg){
  const el = document.getElementById('errBanner');
  el.textContent = msg; el.classList.add('active');
  setTimeout(()=>el.classList.remove('active'), 5000);
}
function clearErr(){ document.getElementById('errBanner').classList.remove('active'); }

// ═══════════════════════════════════════════
// Fetch via JSONP（不需要任何 proxy，直接繞過 CORS）
// ═══════════════════════════════════════════
async function fetchAllResponses(numId){
  if(!WORKER_URL || WORKER_URL === 'YOUR_WORKER_URL_HERE'){
    throw new Error('請先在 HTML 檔案中設定 WORKER_URL（Cloudflare Worker 網址）');
  }
  const msgs = [];
  let fromId = 0;
  const seen = new Set();

  while(true){
    const url = `${WORKER_URL}/responses?plurk_id=${numId}&from_response_id=${fromId}`;
    const r = await fetch(url, { signal: AbortSignal.timeout(15000) });
    if(!r.ok) throw new Error(`Worker 回應錯誤 HTTP ${r.status}`);
    const data = await r.json();

    if(data.error || data.error_text){
      throw new Error('Plurk 錯誤：' + (data.error || data.error_text));
    }

    const responses = data.responses || [];
    if(!responses.length) break;

    let newCount = 0;
    for(const resp of responses){
      const rid = resp.id;
      if(seen.has(rid)) continue;
      seen.add(rid);
      newCount++;
      msgs.push({
        content:   parseContent(resp.content || ''),
        posted_at: resp.posted || '',
      });
    }

    document.getElementById('loadingMsg').textContent =
      `正在抓取留言… 已取得 ${msgs.length} 則`;

    if(responses.length < 20) break;
    if(newCount === 0) break;
    fromId = responses[responses.length-1].id || 0;
    await sleep(400);
  }
  return msgs;
}

function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

// ═══════════════════════════════════════════
// Content parsing (HTML → plain text with dice tags)
// ═══════════════════════════════════════════
function normalize(s){
  let r='';
  for(const c of s){
    const code=c.codePointAt(0);
    r += (code>=0xFF01&&code<=0xFF5E) ? String.fromCodePoint(code-0xFEE0) : c;
  }
  return r;
}

function parseContent(html){
  // multi-digit range dice
  html = html.replace(
    /<img[^>]+alt="\(dice(\d+)-(\d+)\)"[^>]+rnd="(\d+)"[^>]*>((?:<img[^>]+alt=""[^>]+rnd="\d+"[^>]*>)*)/g,
    (_,lo,hi,first,rest)=>{
      const extra=[...rest.matchAll(/rnd="(\d+)"/g)].map(m=>m[1]);
      return `[d${lo}-${hi}:${first+extra.join('')}]`;
    }
  );
  // normal dice (any attribute order)
  html = html.replace(/<img[^>]+>/g, tag=>{
    const facesM = /alt="\(dice(\d+)\)"/.exec(tag);
    const rndM   = /rnd="(\d+)"/.exec(tag);
    if(facesM && rndM) return `[d${facesM[1]}:${rndM[1]}]`;
    const bzzM   = /alt="\(bzzz\)"/.exec(tag);
    const rndnM  = /rndnum="(\d+)"/.exec(tag);
    if(bzzM && rndnM) return `[bzz:${rndnM[1]}]`;
    const altM   = /alt="([^"]*)"/.exec(tag);
    return altM ? altM[1] : '';
  });
  html = html.replace(/<br\s*\/?>/gi, '\n');
  html = html.replace(/<[^>]+>/g, '');
  return normalize(
    html.replace(/&amp;/g,'&').replace(/&lt;/g,'<')
        .replace(/&gt;/g,'>').replace(/&nbsp;/g,' ').trim()
  );
}

// ═══════════════════════════════════════════
// Damage calculation
// ═══════════════════════════════════════════
function normalizeFaces(s){
  const m=/d?(\d+)/i.exec((s||'').trim());
  return m?m[1]:'';
}

function calcSide(expr){
  let total=0,hasUnknown=false,hasDice=false;
  const re=/\[d\d+:(\?|\d+)\]|([+-]?\d+)(?![:\]])/g;
  let m;
  while((m=re.exec(expr))!==null){
    if(m[1]!==undefined){ hasDice=true; if(m[1]==='?') hasUnknown=true; else total+=parseInt(m[1]); }
    else if(m[2]!==undefined){ total+=parseInt(m[2]); }
  }
  return {total,hasUnknown,hasDice};
}

function extractAttacksForFaces(content, facesNorm){
  const results=[];
  for(const line of content.split('\n')){
    const sides = line.split(/[／\/\\＼]/);
    if(sides.length<2) continue;
    const bMatch = /\[d(\d+):/.exec(sides[1]);
    if(!bMatch || bMatch[1]!==facesNorm) continue;
    const hasRed = /\[bzz:2\]/.test(line);
    const r = calcSide(sides[0]);
    if(!r.hasUnknown && r.hasDice) results.push(hasRed ? r.total*2 : r.total);
  }
  return results;
}

function computeBossHp(b){
  const norm   = normalizeFaces(b.faces);
  const count  = parseInt(b.count)||0;
  const hpEach = parseInt(b.hpEach)||0;
  const deduct = parseInt(b.deduct)||0;
  if(!norm||!count||!hpEach) return null;
  let hp = count*hpEach - deduct;
  for(const msg of allMsgs){
    for(const dmg of extractAttacksForFaces(msg.content, norm)){
      hp -= dmg;
    }
  }
  return hp;
}

// ═══════════════════════════════════════════
// Pie chart (Canvas)
// ═══════════════════════════════════════════
function drawPie(canvas, hp, maxHp){
  const dpr = window.devicePixelRatio||1;
  const sz  = 200;
  canvas.width  = sz*dpr;
  canvas.height = sz*dpr;
  canvas.style.width  = sz+'px';
  canvas.style.height = sz+'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  const cx=sz/2, cy=sz/2, r=sz/2-6;

  const dead = hp<=0;
  const frac = dead ? 0 : (maxHp>0 ? Math.min(hp/maxHp,1) : 0);

  // bg
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.fillStyle='#23263a'; ctx.fill();

  if(dead){
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.fillStyle='#3a3d4e'; ctx.fill();
  } else {
    const start = -Math.PI/2;
    const end   = start + frac*Math.PI*2;
    // green
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,start,end); ctx.closePath();
    ctx.fillStyle='#82D900'; ctx.fill();
    // dark
    if(frac<1){
      ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,end,start+Math.PI*2); ctx.closePath();
      ctx.fillStyle='#3a3d4e'; ctx.fill();
    }
  }
  // rim
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.strokeStyle='rgba(0,0,0,.3)'; ctx.lineWidth=3; ctx.stroke();
}

// ═══════════════════════════════════════════
// Battle view
// ═══════════════════════════════════════════
function buildBattleView(){
  const grid = document.getElementById('pieGrid');
  grid.innerHTML = '';
  maxHpMap = {};
  bossData.forEach((b,i)=>{
    const norm   = normalizeFaces(b.faces);
    const count  = parseInt(b.count)||0;
    const hpEach = parseInt(b.hpEach)||0;
    const deduct = parseInt(b.deduct)||0;
    if(!norm||!count||!hpEach) return;
    maxHpMap[i] = count*hpEach - deduct;
    const col = document.createElement('div');
    col.className='pie-col'; col.id='pieCol'+i;
    col.innerHTML=`
      <div class="pie-boss-name">${esc(b.name)}</div>
      <div class="pie-wrap">
        <canvas id="pieCanvas${i}"></canvas>
        <div class="pie-num" id="pieNum${i}">-</div>
      </div>`;
    grid.appendChild(col);
  });
}

function updateBattleDisplay(){
  let allDead = true;
  bossData.forEach((b,i)=>{
    if(!(i in maxHpMap)) return;
    const hp = computeBossHp(b);
    if(hp===null) return;
    const cv = document.getElementById('pieCanvas'+i);
    const nm = document.getElementById('pieNum'+i);
    if(!cv||!nm) return;
    drawPie(cv, hp, maxHpMap[i]);
    nm.textContent = String(hp);
    nm.className   = 'pie-num' + (hp<=0?' dead':'');
    if(hp>0) allDead=false;
  });
  return allDead;
}

function setStatus(html, isErr){
  const el = document.getElementById('statusBar');
  el.innerHTML = html;
  el.className = 'status-bar' + (isErr?' error':'');
}

// ═══════════════════════════════════════════
// Auto refresh loop
// ═══════════════════════════════════════════
function stopAuto(){
  autoActive=false;
  if(autoTimer){ clearTimeout(autoTimer); autoTimer=null; }
}

function scheduleNext(){
  autoTimer = setTimeout(doAutoRefresh, 10000);
}

async function doAutoRefresh(){
  if(!autoActive) return;
  setStatus('刷新中…');
  try{
    allMsgs = await fetchAllResponses(numericId);
    hideLoading();
    const done = updateBattleDisplay();
    if(done){
      autoActive=false;
      setStatus('所有怪物已死亡　自動刷新已停止');
    } else {
      setStatus('<b>自動刷新中</b>　預設每 10 秒自動刷新直到所有怪物死亡');
      scheduleNext();
    }
  } catch(e){
    hideLoading();
    setStatus('刷新失敗：'+e.message, true);
    scheduleNext(); // 繼續嘗試
  }
}

// ═══════════════════════════════════════════
// Start battle
// ═══════════════════════════════════════════
async function startBattle(){
  clearErr();
  // validate url
  if(!numericId){ showErr('請先填入噗文網址'); return; }
  // validate unique faces
  const used={};
  for(const b of bossData){
    const n=normalizeFaces(b.faces);
    if(!n) continue;
    if(used[n]){ showErr(`「${b.name}」與「${used[n]}」骰面相同，請修改後再開始`); return; }
    used[n]=b.name;
  }
  const any = bossData.some(b=>normalizeFaces(b.faces)&&parseInt(b.count)&&parseInt(b.hpEach));
  if(!any){ showErr('請至少設定一隻完整的怪物（骰面／數量／單體HP）'); return; }

  stopAuto();
  showLoading('正在抓取留言…');
  document.getElementById('battleBtn').disabled=true;

  try{
    allMsgs = await fetchAllResponses(numericId);
  } catch(e){
    hideLoading();
    document.getElementById('battleBtn').disabled=false;
    showErr('無法抓取留言：'+e.message);
    return;
  }
  hideLoading();

  document.getElementById('setupSection').classList.add('hidden');
  document.getElementById('battleSection').classList.add('active');
  document.getElementById('manualBtn').disabled=false;

  buildBattleView();
  const done = updateBattleDisplay();

  if(done){
    setStatus('所有怪物已死亡　自動刷新已停止');
  } else {
    autoActive=true;
    setStatus('<b>自動刷新中</b>　預設每 10 秒自動刷新直到所有怪物死亡');
    scheduleNext();
  }
}

// ═══════════════════════════════════════════
// Manual refresh
// ═══════════════════════════════════════════
async function manualRefresh(){
  stopAuto(); // 停止自動刷新
  const btn = document.getElementById('manualBtn');
  btn.disabled=true;
  setStatus('手動刷新中…');
  showLoading('手動刷新中…');

  try{
    allMsgs = await fetchAllResponses(numericId);
    hideLoading();
    updateBattleDisplay(); // 允許繼續顯示負血值，不判斷 allDead
    setStatus('已刷新　自動刷新已停止（重置後可重新啟動）');
  } catch(e){
    hideLoading();
    setStatus('刷新失敗：'+e.message, true);
  }
  btn.disabled=false;
}

// ═══════════════════════════════════════════
// Reset
// ═══════════════════════════════════════════
function resetAll(){
  stopAuto();
  allMsgs=[];

  // 清除 localStorage
  localStorage.removeItem(bKey());
  localStorage.removeItem(uKey());
  localStorage.removeItem(tKey());

  // 清除網址
  plurkIdStr=''; numericId=0;
  document.getElementById('urlInput').value='';
  setUrlDisplay('');

  // 清除標題
  document.getElementById('pageTitle').textContent='戰況即時血量';

  // 重置怪物資料
  bossData=[
    {name:'怪1',faces:'',count:'',hpEach:'',deduct:''},
    {name:'怪2',faces:'',count:'',hpEach:'',deduct:''},
    {name:'怪3',faces:'',count:'',hpEach:'',deduct:''},
  ];
  renderBossSetup();

  // 切回設定畫面
  document.getElementById('setupSection').classList.remove('hidden');
  document.getElementById('battleSection').classList.remove('active');
  document.getElementById('battleBtn').disabled=false;
  document.getElementById('pieGrid').innerHTML='';
  document.getElementById('manualBtn').disabled=false;
  setStatus('');
  clearErr();
}

// ═══════════════════════════════════════════
// Loading overlay
// ═══════════════════════════════════════════
function showLoading(msg){
  document.getElementById('loadingMsg').textContent=msg||'讀取中…';
  document.getElementById('loading').classList.add('active');
}
function hideLoading(){
  document.getElementById('loading').classList.remove('active');
}

// ═══════════════════════════════════════════
// Utility
// ═══════════════════════════════════════════
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
